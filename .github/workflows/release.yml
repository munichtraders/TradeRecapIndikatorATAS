name: Release

on:
  push:
    tags:
      - 'v*'
      - 'beta-*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Versionsnummer und Typ ermitteln
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == beta-* ]]; then
            echo "version=${TAG#beta-}" >> $GITHUB_OUTPUT
            echo "is_beta=true" >> $GITHUB_OUTPUT
            echo "label=Beta" >> $GITHUB_OUTPUT
          else
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
            echo "is_beta=false" >> $GITHUB_OUTPUT
            echo "label=Trade Recap" >> $GITHUB_OUTPUT
          fi

      - name: DLL vorhanden?
        run: |
          if [ ! -f "MunichTraders.TradeRecap.dll" ]; then
            echo "❌ MunichTraders.TradeRecap.dll nicht gefunden — vor dem Tag-Push committen!"
            exit 1
          fi

      - name: GitHub Release erstellen
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }} — ${{ steps.version.outputs.label }}"
          body_path: CHANGELOG.md
          files: MunichTraders.TradeRecap.dll
          draft: false
          prerelease: ${{ steps.version.outputs.is_beta }}
